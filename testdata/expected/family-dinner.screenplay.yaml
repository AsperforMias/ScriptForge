version: "1.0"
source:
    title: 回家吃饭
    author: 示例作者
    language: zh-CN
    chapter_count: 3
    chapters:
        - index: 1
          title: 第一章 病房电话
          summary: 程安在医院病房外接到母亲电话，得知父亲坚持出院回家吃团圆饭。她必须在家人与医生建议之间做决定。
        - index: 2
          title: 第二章 厨房争执
          summary: 傍晚，程安回到家里厨房准备晚饭，姐姐却指责她总拿工作当借口，家里的旧账被重新翻出来。
        - index: 3
          title: 第三章 客厅和解
          summary: 夜里，父亲坐在客厅里主动提起多年前的误会，程安终于决定把压在心里的话说出口。
