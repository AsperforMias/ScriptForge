    author: 示例作者
    language: zh-CN
    chapter_count: 3
    chapters:
        - index: 1
          title: 第一章 操场加练
          summary: 周宁晚上独自在操场加练接力，教练突然通知主力队友可能缺席决赛。她第一次意识到最后一棒会落到自己手里。
        - index: 2
          title: 第二章 教室争执
          summary: 第二天一早，她在教室里听见替补队友质疑战术安排，队伍差点在比赛前先吵散。周宁只能临时站出来稳住大家。
        - index: 3
          title: 第三章 跑道起跑
          summary: 比赛当天清晨，周宁站上跑道，决定不再等待主力归队，而是带着现有阵容把接力跑完。
