      title: "第二章 旧楼里的纸条"
      summary: "市立第三医院的走廊灯光昏黄，空气里有消毒水和潮湿雨衣混在一起的味道。 林渡刚走到病房门口，就被一个穿白大褂的男人拦住了。"
    - index: 3
      title: "第三章 地下室的第二把钥匙"
      summary: "林渡是在半夜回到老房子的。 这栋楼建于二十多年前，墙面外层早就起了皮，楼道里光线昏暗。"
